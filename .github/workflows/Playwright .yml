name: Playwright Tests

on:
  #push:
   # branches: 
     # -main
     # -master
  #pull_request:
  #  branches:
     # -main
      #-master
  schedule:
    - cron: "0 13 * * *"  #Runs at 13:00 UTC time
          workflow_dispatch:
jobs:
  playwright tests:
    name: 'Run Playwright tests'
    timeout-minuts: 60
    runs-on: windows-latest #  for mac macos-latest
    permission:
      contents: write

      # Set up NodeJS version
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: "npm"
      - name: Install dependencies
        run: npm ci

        #Install Playwright Chromium Browser
      - name: Install Playwright Chrome
        run: npx playwright install --with-deps chromium

        # configuring environment variables Example:
        name: Configuring environment variables from secrets
        run : 
          echo "PRACTICE_USERNAME=${{ secrets.PRACTICE_USERNAME}}" .env
          echo "PRACTICE_PASSWORD=${{ secrets.PRACTICE_PASSWORD}}" .env

         # Running test with Playwright 
      - name: Run Playwright tests
        run: npx playwright test #scrip form package.json tests:headless

        name: Upload Playwright HTML report
        if : always()
        uses: action/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          reention-days: 30
